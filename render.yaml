databases:
  - name: iran-dashboard-db
    databaseName: iran_dashboard
    user: admin

services:
  # 1. Redis Broker / Cache
  - type: redis
    name: iran-dashboard-redis
    ipAllowList: [] # internal use only
    plan: free
    maxmemoryPolicy: noeviction

  # 2. FastAPI Web Services
  - type: web
    name: iran-dashboard-api
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iran-dashboard-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: iran-dashboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      # Add user-defined secrets externally (OPENAI_API_KEY, NEWS_API_KEY)
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false

  # 3. Celery Worker (Background tasks)
  - type: worker
    name: iran-dashboard-worker
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iran-dashboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false

  # 4. Celery Beat (Scheduler)
  - type: worker
    name: iran-dashboard-beat
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: celery -A app.workers.celery_app beat --loglevel=info
    plan: free
    region: singapore
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: iran-dashboard-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: iran-dashboard-db
          property: connectionString
